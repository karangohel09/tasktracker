spring:
  application:
    name: tasktracker

  datasource:
    url: jdbc:mysql://localhost:3307/task
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081